<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing you in… — Tropesmith</title>
<meta name="robots" content="noindex, nofollow">

<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="icon" type="image/png" href="https://r2-media-server.plotprose-scraper.workers.dev/tropesmith-assets/logo-icon-512.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/styles.css?v=20260625e" />

<style>
  .verify-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .verify-card { max-width: 460px; text-align: center; }
  .verify-logo { margin: 0 auto 28px; }
  .verify-logo img { display: block; margin: 0 auto; height: 60px; width: auto; }
  .verify-h { font-family: var(--ts-serif); font-size: 2rem; font-weight: 700; color: var(--ts-ink); margin: 0 0 12px 0; line-height: 1.15; }
  .verify-sub { color: var(--ts-ink-soft); font-size: 1rem; margin: 0 0 24px 0; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(26,18,8,0.12); border-top-color: var(--ts-grad-start); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 24px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ok-tick { font-size: 2.5rem; color: #22a06b; margin-bottom: 16px; }
</style>
  <script src="/assets/analytics.js?v=20260627" defer></script>
</head>
<body>

<main id="main" class="verify-shell">
  <div class="verify-card">
    <div class="verify-logo">
      <a href="../index.html"><img src="https://r2-media-server.plotprose-scraper.workers.dev/tropesmith-assets/logo-header.png" alt="Tropesmith" width="160" height="113" /></a>
    </div>

    <div id="loading-state">
      <div class="spinner"></div>
      <h1 class="verify-h">Signing you in…</h1>
      <p class="verify-sub">Just a moment.</p>
    </div>

    <div id="success-state" style="display:none">
      <div class="ok-tick">✓</div>
      <h1 class="verify-h">Welcome back</h1>
      <p class="verify-sub">Redirecting to your library…</p>
    </div>

    <div id="error-state" style="display:none">
      <h1 class="verify-h">Sign-in link not valid</h1>
      <p class="verify-sub" id="error-msg">Network error. Please try again.</p>
      <a href="../login/index.html" class="btn btn-primary btn-lg" style="margin-top:8px">Request a new link <span class="arrow">→</span></a>
    </div>
  </div>
</main>

<script>
(function () {
  const SUPABASE_URL = '/api';
  const params = new URLSearchParams(window.location.search);
  const token = (params.get('token') || '').trim();
  const next = params.get('next') || '/library/';

  const loadingEl = document.getElementById('loading-state');
  const successEl = document.getElementById('success-state');
  const errorEl = document.getElementById('error-state');
  const errorMsg = document.getElementById('error-msg');

  function showError(msg) {
    loadingEl.style.display = 'none';
    errorMsg.textContent = msg;
    errorEl.style.display = 'block';
  }

  if (!token) {
    showError('Sign-in link is missing or invalid. Please request a new one.');
    return;
  }

  fetch(SUPABASE_URL + '/functions/v1/auth-verify-magic-link', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token })
  })
    .then(resp => resp.json().then(data => ({ ok: resp.ok, data: data })))
    .then(r => {
      if (r.ok) {
        loadingEl.style.display = 'none';
        successEl.style.display = 'block';
        setTimeout(() => { window.location.href = next; }, 600);
      } else {
        showError(r.data.error || 'Sign-in failed. Please request a new link.');
      }
    })
    .catch(() => {
      showError('Network error. Please try again.');
    });
})();
</script>

</body>
</html>
